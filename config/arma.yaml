flow_csv: 'data/river-flow-imputed-with-non-nans.csv'
clim_csv: 'data/daily-ts-means-per-station.csv' 
other_csv: ''
station_attrs: 'data/nrfa-station-metadata.csv'
station_attrs_cols: [
    "catchment-area",
    "saar-1961-1990",
    "lcm2007-urban",
    "bfihost",
    "farl",
    "dpsbar",
    "propwet"
]
adj_np: 'data/adj-mat-all-stations.csv'  
scaler: StandardScaler

model_name: 'ARMA'
  
history: 7  
horizon: 7  
hidden: 64  
num_layers: 2  

batch_size: 32
epochs: 100
lr: 0.0001  
weight_decay: 0.00001 
lambda_Ldir: 0.001
optimizer: 'adam'  
patience: 10 
loss_function: 'mse'  
min_nse_delta: 0.0001  

train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

num_runs: 10
start_seed: 42  

results_dir: 'data/results/${model_name}-${other_csv}-h=${horizon}-and-l=${history}'
log_dir: 'data/logs/${model_name}-${other_csv}-h=${horizon}-and-l=${history}'
device: 'cuda'  
use_multi_gpu: True 
