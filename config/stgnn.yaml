flow_csv: 'data/river-flow-imputed-with-non-nans.csv'
clim_csv: 'data/daily-ts-means-per-station.csv' 
other_csv: '' 
station_attrs: 'data/nrfa-station-metadata.csv'
station_attrs_cols: [
    "catchment-area",
    "saar-1961-1990",
    "lcm2007-urban",
    "bfihost",
    "farl",
    "dpsbar",
    "propwet"
]
adj_np: 'data/adj-mat-all-stations.csv'
binary_adj: False
un_adj: False

scaler: StandardScaler

history: 7
horizon: 7  
hidden: 64
output_dim: 1  
num_layers: 1

Kt: 3
Ks: 3
n_his: ${history}
act_func: 'relu'
graph_conv_type: 'graph_conv'
enable_bias: True
droprate: 0.2
opt_only_lambda_dir: False
trials: 150

batch_size: 16
epochs: 100
lr: 0.0001  
add_storage: False
reg_4_loss: ''
model_name: 'STGNN${reg_4_loss}'
lambda_L_dir: 0.45
lambda_nl_reg:
weight_decay: 0.00001  
optimizer: 'adam'  
patience: 10  
loss_function: 'mse'  
min_nse_delta: 0.0001  

train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

num_runs: 10
start_seed: 42 

results_dir: 'data/results/${model_name}-${other_csv}-binary=${binary_adj}-und=${un_adj}-h=${horizon}-and-l=${history}'
log_dir: 'data/logs/${model_name}-${other_csv}-binary=${binary_adj}-un=${un_adj}-h=${horizon}-and-l=${history}'

device: 'cuda' 
use_multi_gpu: True 
